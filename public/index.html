<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LoveDrop — лёгкие JPG-фоточки для web</title>
  <meta name="description" content="LoveDrop — маленький сервис для быстрой подготовки изображений к web. Загрузи фото и получи облегчённый JPG без лишних настроек." />
  <meta name="keywords" content="LoveDrop, сжать фото, облегчить изображение, JPG для web, конвертер фото, оптимизация изображений" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#ff5fa2" />
  <link rel="canonical" href="https://love.cinemaprompt.ru/" />

  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ru_RU" />
  <meta property="og:url" content="https://love.cinemaprompt.ru/" />
  <meta property="og:title" content="LoveDrop — лёгкие JPG-фоточки для web" />
  <meta property="og:description" content="Маленький нежный сервис: загрузи фото, нажми «Чпоньк» и скачай облегчённый JPG." />
  <meta property="og:image" content="https://love.cinemaprompt.ru/og-image.svg" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="LoveDrop — лёгкие JPG-фоточки для web" />
  <meta name="twitter:description" content="Загрузи фото, нажми «Чпоньк» и скачай облегчённый JPG." />
  <meta name="twitter:image" content="https://love.cinemaprompt.ru/og-image.svg" />

  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.svg" />
  <link rel="manifest" href="/site.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="card" aria-label="Облегчитель фоточек">
      <div class="glow glow-one"></div>
      <div class="glow glow-two"></div>

      <p class="eyebrow">нежный jpg-компрессор</p>
      <h1>Облегчитель картиночек для Аси</h1>
      <p class="subtitle">Загрузи изображеньице — и я аккуратно сделаю его лёгким, красивым и готовым для публикации.</p>

      <div class="start-screen" id="startScreen">
        <form class="upload-form" id="uploadForm">
          <label class="dropzone" for="photoInput">
            <input id="photoInput" type="file" accept="image/*" />
            <span class="drop-icon">♡</span>
            <span class="drop-title">Выбери фоточку</span>
            <span class="drop-text" id="fileName">или перетащи её сюда</span>
          </label>

          <div class="actions">
            <button class="btn btn-main" type="submit">Чпоньк</button>
            <button class="btn btn-heart" id="loveBtn" type="button" aria-label="Признание в любви">
              ♥
            </button>
          </div>
        </form>

        <div class="love-note" id="loveNote" aria-live="polite">
          Я люблю тебя нежно, смешно и по-настоящему.
        </div>
      </div>

      <section class="result hidden" id="result">
        <div class="result-image" id="resultImageWrap">
          <img id="resultImage" alt="Облегчённая картиночка" />
          <span id="resultPlaceholder">тут появится облегчённая картиночка</span>
        </div>
        <h2>Вот твоя картиночка, малышка!</h2>
        <p class="result-meta" id="resultMeta">Готовим лёгкую JPG-картиночку…</p>
        <div class="result-actions">
          <a href="#" class="btn btn-main download-button" id="downloadBtn" download>Скачать</a>
          <button class="btn btn-secondary" id="newPhotoBtn" type="button">Загрузить новое</button>
        </div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
